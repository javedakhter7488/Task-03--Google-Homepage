<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Google</title>

  <!-- Favicon (base64 inline so it works without a server) -->
  <link rel="icon" href="data:image/svg+xml,
    <svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 48 48'>
      <text y='36' font-size='36'>G</text>
    </svg>" />

  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══════════════════════════════════════
       TOP NAV BAR
  ═══════════════════════════════════════ -->
  <header class="top-nav">
    <a href="#">Gmail</a>
    <a href="#">Images</a>

    <!-- 3×3 apps grid icon -->
    <span class="icon-apps" title="Google apps" role="button" tabindex="0" aria-label="Google apps">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M6 8a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM6 14a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zM6 20a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4zm6 0a2 2 0 1 0 0-4 2 2 0 0 0 0 4z"/>
      </svg>
    </span>

    <a href="#" class="btn-signin">Sign in</a>
  </header>


  <!-- ══════════════════════════════════════
       MAIN — logo + search
  ═══════════════════════════════════════ -->
  <main>

    <!-- Google SVG Logo (official colour wordmark) -->
    <div class="google-logo" aria-label="Google">
      <svg viewBox="0 0 272 92" xmlns="http://www.w3.org/2000/svg" aria-hidden="true" focusable="false">
        <!-- G -->
        <path fill="#4285F4"
          d="M115.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18C71.25 34.32 81.24 25 93.5 25s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44S80.99 39.2 80.99 47.18c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
        <!-- o -->
        <path fill="#EA4335"
          d="M163.75 47.18c0 12.77-9.99 22.18-22.25 22.18s-22.25-9.41-22.25-22.18c0-12.85 9.99-22.18 22.25-22.18s22.25 9.32 22.25 22.18zm-9.74 0c0-7.98-5.79-13.44-12.51-13.44s-12.51 5.46-12.51 13.44c0 7.9 5.79 13.44 12.51 13.44s12.51-5.55 12.51-13.44z"/>
        <!-- o (second) -->
        <path fill="#FBBC05"
          d="M209.75 26.34v39.82c0 16.38-9.66 23.07-21.08 23.07-10.75 0-17.22-7.19-19.66-13.07l8.48-3.53c1.51 3.61 5.21 7.87 11.17 7.87 7.31 0 11.84-4.51 11.84-13v-3.19h-.34c-2.18 2.69-6.38 5.04-11.68 5.04-11.09 0-21.25-9.66-21.25-22.09 0-12.52 10.16-22.26 21.25-22.26 5.29 0 9.49 2.35 11.68 4.96h.34v-3.62h9.25zm-8.56 20.92c0-7.81-5.21-13.52-11.84-13.52-6.72 0-12.35 5.71-12.35 13.52 0 7.73 5.63 13.36 12.35 13.36 6.63 0 11.84-5.63 11.84-13.36z"/>
        <!-- g -->
        <path fill="#4285F4"
          d="M225 3v65h-9.5V3h9.5z"/>
        <!-- l -->
        <path fill="#34A853"
          d="M262.02 54.48l7.56 5.04c-2.44 3.61-8.32 9.83-18.48 9.83-12.6 0-22.01-9.74-22.01-22.18 0-13.19 9.49-22.18 20.92-22.18 11.51 0 17.14 9.16 18.98 14.11l1.01 2.52-29.65 12.28c2.27 4.45 5.8 6.72 10.75 6.72 4.96 0 8.4-2.44 10.92-6.14zm-23.27-7.98l19.82-8.23c-1.09-2.77-4.37-4.7-8.23-4.7-4.95 0-11.84 4.37-11.59 12.93z"/>

        <!-- "G" of Google — big cap letter -->
        <path fill="#4285F4"
          d="M35.29 41.41V32h31.77c.31 1.64.47 3.58.47 5.68 0 7.06-1.93 15.79-8.15 22.01-6.05 6.3-13.78 9.66-24.03 9.66C16.32 69.35.36 53.89.36 34.91.36 15.93 16.32.47 35.35.47c10.5 0 17.98 4.12 23.6 9.49l-6.64 6.64c-4.03-3.78-9.49-6.72-16.97-6.72-13.86 0-24.7 11.17-24.7 25.03 0 13.86 10.84 25.03 24.7 25.03 8.99 0 14.11-3.61 17.39-6.89 2.66-2.66 4.41-6.46 5.1-11.65l-22.54.01z"/>
      </svg>
    </div>

    <!-- Search Box -->
    <div class="search-wrapper">

      <div class="search-box" role="search">

        <!-- Magnifying glass -->
        <span class="search-icon" aria-hidden="true">
          <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
            <path d="M20.49 19l-5.73-5.73A7.5 7.5 0 1 0 13 14.77L18.73 20.5 20.49 19zM5 10.5a5.5 5.5 0 1 1 11 0 5.5 5.5 0 0 1-11 0z"/>
          </svg>
        </span>

        <!-- Text input -->
        <input
          id="searchInput"
          class="search-input"
          type="text"
          autocomplete="off"
          autocorrect="off"
          autocapitalize="off"
          spellcheck="false"
          aria-label="Search"
          title="Search"
          maxlength="2048"
        />

        <!-- Right-side icons: mic + divider + lens -->
        <div class="search-right-icons">

          <!-- Mic -->
          <span id="micBtn" class="search-icon-btn" title="Search by voice" role="button" tabindex="0" aria-label="Search by voice">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path fill="#4285f4" d="M12 1a4 4 0 0 1 4 4v6a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4z"/>
              <path fill="#34a853" d="M19 10a1 1 0 0 0-2 0 5 5 0 0 1-10 0 1 1 0 0 0-2 0 7 7 0 0 0 6 6.92V19H9a1 1 0 0 0 0 2h6a1 1 0 0 0 0-2h-2v-2.08A7 7 0 0 0 19 10z"/>
            </svg>
          </span>

          <div class="icon-divider" aria-hidden="true"></div>

          <!-- Google Lens -->
          <span class="search-icon-btn" title="Search by image" role="button" tabindex="0" aria-label="Search by image">
            <svg viewBox="0 0 192 192" xmlns="http://www.w3.org/2000/svg">
              <rect width="192" height="192" fill="none"/>
              <g>
                <circle fill="#EA4335" cx="148" cy="44"  r="20"/>
                <circle fill="#4285F4" cx="44"  cy="44"  r="20"/>
                <circle fill="#34A853" cx="44"  cy="148" r="20"/>
                <circle fill="#FBBC05" cx="148" cy="148" r="20"/>
                <circle fill="none" stroke="#5f6368" stroke-width="16" cx="96" cy="96" r="36"/>
              </g>
            </svg>
          </span>

        </div>
      </div>

      <!-- Buttons -->
      <div class="search-buttons">
        <button id="btnGoogleSearch" class="btn-search" type="button">Google Search</button>
        <button id="btnLucky"        class="btn-search" type="button">I'm Feeling Lucky</button>
      </div>

      <!-- Language line -->
      <p class="language-line">
        Google offered in:
        <a href="#">हिन्दी</a>
        <a href="#">বাংলা</a>
        <a href="#">తెలుగు</a>
        <a href="#">मराठी</a>
        <a href="#">தமிழ்</a>
        <a href="#">ગુજરાતી</a>
        <a href="#">ಕನ್ನಡ</a>
        <a href="#">മലയാളം</a>
        <a href="#">ਪੰਜਾਬੀ</a>
      </p>

    </div>
  </main>


  <!-- ══════════════════════════════════════
       FOOTER
  ═══════════════════════════════════════ -->
  <footer>
    <div class="footer-top">
      India
    </div>
    <div class="footer-bottom">
      <nav class="footer-left" aria-label="Footer navigation left">
        <span class="footer-link">About</span>
        <span class="footer-link">Advertising</span>
        <span class="footer-link">Business</span>
        <span class="footer-link">How Search works</span>
      </nav>
      <nav class="footer-right" aria-label="Footer navigation right">
        <span class="footer-link">Privacy</span>
        <span class="footer-link">Terms</span>
        <span class="footer-link">Settings</span>
      </nav>
    </div>
  </footer>


  <!-- JavaScript -->
  <script src="script.js"></script>

</body>
</html>
